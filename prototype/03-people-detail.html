<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFF7F8;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .heart-filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#FF4D6D",
                        "primary-soft": "#FFE3E8",
                        accent: "#7C3AED",
                        "accent-soft": "#EDE4FF",
                        success: "#10B981",
                        "success-soft": "#D4F7E8",
                        warning: "#F59E0B",
                        danger: "#EF4444",
                        bg: "#FFF7F8",
                        surface: "#FFFFFF"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <style>body,p,span,div,h1,h2,h3,h4,h5,h6,li,td,th,button,label,a{word-break:keep-all;overflow-wrap:break-word;}</style></head>
<body class="min-h-screen text-slate-900">
<!-- TopAppBar -->
<header class="bg-[#FFF7F8] dark:bg-slate-950 flex justify-between items-center w-full px-4 h-16 fixed top-0 z-50 border-none">
<button class="w-10 h-10 flex items-center justify-center hover:bg-[#FFE3E8] dark:hover:bg-slate-800 transition-colors rounded-full active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[#FF4D6D]">arrow_back</span>
</button>
<h1 class="font-bold text-[18px] text-slate-900 dark:text-slate-100">Light #02</h1>
<button class="w-10 h-10 flex items-center justify-center hover:bg-[#FFE3E8] dark:hover:bg-slate-800 transition-colors rounded-full active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-[#FF4D6D]">more_vert</span>
</button>
</header>
<main class="pt-20 pb-24 px-5 max-w-md mx-auto">
<!-- Profile Section -->
<section class="flex flex-col items-center text-center mb-8">
<div class="relative mb-4">
<div class="w-[120px] h-[120px] rounded-full border-4 border-primary-soft overflow-hidden bg-white">
<img alt="Light #02 Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a handsome man in a tailored dark suit, soft warm studio lighting, minimalist beige background, professional yet friendly expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCP_y1BsqwzpCxrp_gRyVwvzvCnQmNW33Q8tQ1oYpxAEdZxzJEfIDKrjGW9S12JzcM7sva1HoIhE8WzSN5p67PZhcwevfFyyyXeAncTlHdnfkoeRTE4peiakI9Dns_EbE9W-WXNpz4W2a1cGmZY-9y6d0tFBGDtyDzAhcIhOIvxj8OdjorZENCaTkUgr7S8yqJV89d8AL9jNF2oAj_0NybZeCAMHGs2BEuG5itNQmIwayRlYAdFjZy0gaXVxEuIK8yHi0hDRbm250M"/>
</div>
<div class="absolute bottom-1 right-1 w-4 h-4 bg-success rounded-full border-2 border-white"></div>
</div>
<h2 class="text-[22px] font-bold text-slate-900 mb-1">라이트 #02</h2>
<p class="text-[13px] text-slate-500 mb-3">5분 전 입장</p>
<div class="inline-flex items-center px-4 py-1.5 bg-[#FFE3E8] text-primary rounded-full text-[13px] font-semibold">
<span class="material-symbols-outlined text-[16px] mr-1">check_circle</span>
                ✓ 1차 선택됨
            </div>
</section>
<hr class="border-slate-200/60 mb-8"/>
<!-- Action Section -->
<section class="space-y-6">
<div>
<h3 class="text-[13px] font-bold text-slate-400 mb-3 ml-1">이 사람에게...</h3>
<!-- Heart Card (Selected State) -->
<button class="w-full bg-[#FFE3E8] border-2 border-primary rounded-xl p-6 flex flex-col items-center text-center active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined text-primary text-[48px] heart-filled mb-2">favorite</span>
<span class="text-primary font-bold text-[18px]">하트 보냄</span>
<span class="text-primary/80 text-[13px] mt-1 font-medium">✓ 1차 → 2차 유지</span>
<span class="text-slate-400 text-[11px] mt-4">취소하려면 탭</span>
</button>
</div>
<!-- Message Button -->
<button class="w-full h-[56px] bg-white border-2 border-primary-soft rounded-full flex items-center justify-center gap-2 hover:bg-primary-soft/30 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-primary">mail</span>
<span class="text-primary font-bold text-[15px]">쪽지 쓰기</span>
</button>
</section>
<hr class="border-slate-200/60 my-8"/>
<!-- Status Section -->
<section>
<h3 class="text-[13px] font-bold text-slate-400 mb-4 ml-1">투표 상태</h3>
<div class="bg-white rounded-xl p-4 space-y-4 shadow-sm">
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="text-[15px]">🌸 1차</span>
</div>
<span class="text-success font-bold text-[15px]">✓ 선택</span>
</div>
<div class="h-[1px] bg-slate-50"></div>
<div class="flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="text-[15px]">💜 2차</span>
</div>
<span class="text-success font-bold text-[15px]">✓ 유지</span>
</div>
</div>
</section>
<!-- Safety Section -->
<footer class="mt-12 mb-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-6">
<button class="text-slate-400 text-[13px] flex items-center gap-1 hover:text-danger transition-colors">
<span class="material-symbols-outlined text-[18px]">block</span>
                    차단하기
                </button>
<button class="text-slate-400 text-[13px] flex items-center gap-1 hover:text-danger transition-colors">
<span class="material-symbols-outlined text-[18px]">flag</span>
                    신고하기
                </button>
</div>
<div class="flex items-center gap-1 text-slate-300">
<span class="material-symbols-outlined text-[16px]">info</span>
<span class="text-[11px]">익명 보호를 위해 실제 정보는 공개되지 않습니다.</span>
</div>
</footer>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 pb-safe bg-white/80 dark:bg-slate-900/80 backdrop-blur-md rounded-t-[24px] shadow-[0_-4px_12px_rgba(0,0,0,0.05)] border-t border-slate-100 dark:border-slate-800">
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#FF4D6D] transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined">home</span>
<span class="text-[11px] font-medium mt-1">홈</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#FF4D6D] transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined">celebration</span>
<span class="text-[11px] font-medium mt-1">파티</span>
</button>
<button class="flex flex-col items-center justify-center text-[#FF4D6D] dark:text-[#FF4D6D] font-bold active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="text-[11px] font-medium mt-1">매칭</span>
</button>
<button class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-[#FF4D6D] transition-colors active:scale-95 transition-transform">
<span class="material-symbols-outlined">person</span>
<span class="text-[11px] font-medium mt-1">내 정보</span>
</button>
</nav>
</body></html>
