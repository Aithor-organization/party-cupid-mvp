<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#FF4D6D",
              accent: "#7C3AED",
              success: "#10B981",
              warning: "#F59E0B",
              danger: "#EF4444",
              "primary-soft": "#FFE3E8",
              "accent-soft": "#EDE4FF",
              "success-soft": "#D4F7E8",
              "warning-surface": "#FEF3C7",
              "bg-warm": "#FFF7F8"
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "12px",
              "xl": "1.5rem",
              "full": "24px"
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans", "sans-serif"],
              body: ["Plus Jakarta Sans", "sans-serif"],
              label: ["Plus Jakarta Sans", "sans-serif"]
            },
            fontSize: {
              display: ["28px", { fontWeight: "700" }],
              h1: ["22px", { fontWeight: "700" }],
              h2: ["18px", { fontWeight: "600" }],
              body: ["15px", { fontWeight: "400" }],
              small: ["13px", { fontWeight: "400" }],
              micro: ["11px", { fontWeight: "500" }]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .keep-all { word-break: keep-all; }
        
        /* Subtle pulse for the icon as requested */
        @keyframes subtle-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .animate-subtle-pulse {
            animation: subtle-pulse 3s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  <style>body,p,span,div,h1,h2,h3,h4,h5,h6,li,td,th,button,label,a{word-break:keep-all;overflow-wrap:break-word;}</style></head>
<body class="bg-bg-warm font-body text-slate-900 antialiased selection:bg-primary-soft">
<!-- TopAppBar from Shared Components JSON -->
<header class="fixed top-0 left-0 w-full z-50 bg-rose-50/80 backdrop-blur-md h-16 flex justify-center items-center px-4 font-sans antialiased">
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-rose-500" data-icon="favorite">favorite</span>
<h1 class="text-xl font-bold text-rose-500 tracking-tight">Party Cupid</h1>
</div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen flex flex-col items-center px-6 pt-16 pb-32">
<!-- Top 1/3 Empty Space Spacer -->
<div class="h-[176px] w-full"></div>
<!-- Middle Section -->
<section class="flex flex-col items-center text-center space-y-4 max-w-[280px]">
<div class="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center text-primary mb-2 animate-subtle-pulse shadow-sm">
<span class="material-symbols-outlined !text-[40px]" data-icon="construction">construction</span>
</div>
<h2 class="text-h1 text-slate-800 keep-all leading-tight">
                현재 이벤트 구성 중입니다
            </h2>
<p class="text-body text-slate-500">
                잠시만 기다려주세요
            </p>
</section>
<!-- Information Box -->
<section class="mt-12 w-full max-w-sm">
<div class="bg-warning-surface p-5 rounded-lg border border-warning/10 shadow-sm flex items-start gap-3">
<span class="material-symbols-outlined text-warning !text-[20px] mt-0.5" data-icon="hourglass_top">hourglass_top</span>
<div class="space-y-1">
<p class="text-small font-bold text-amber-900">
                        주최자가 단계를 조정하고 있어요
                    </p>
<p class="text-small text-amber-800/80">
                        곧 다음 단계로 안내해 드릴게요
                    </p>
</div>
</div>
</section>
<!-- Bottom Section -->
<section class="mt-auto pt-8">
<p class="text-micro text-slate-400 font-medium">
                이 화면은 자동으로 사라집니다
            </p>
</section>
</main>
<!-- Footer from Shared Components JSON -->
<footer class="fixed bottom-8 left-0 w-full flex flex-col items-center gap-2 px-6 bg-transparent">
<div class="flex gap-4">
<a class="text-[11px] font-medium leading-tight text-rose-400 hover:text-rose-600 transition-colors" href="#">운영 정책</a>
<a class="text-[11px] font-medium leading-tight text-rose-400 hover:text-rose-600 transition-colors" href="#">문의하기</a>
</div>
<p class="text-[11px] font-medium leading-tight text-rose-400">© 2024 Party Cupid. All rights reserved.</p>
</footer>
<!-- Decorative background elements for premium feel -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute -top-[10%] -right-[10%] w-[40%] h-[40%] bg-rose-200/20 blur-[80px] rounded-full"></div>
<div class="absolute -bottom-[5%] -left-[5%] w-[30%] h-[30%] bg-rose-300/10 blur-[60px] rounded-full"></div>
</div>
</body></html>
